name: trust_ai
description: Trust AI — Personalised recovery companion
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  provider: ^6.1.2

  # HTTP client — mirrors Axios in the RN app
  dio: ^5.4.3

  # HIPAA-grade secure storage (iOS Keychain / Android Keystore)
  flutter_secure_storage: ^9.2.2

  # Fonts
  google_fonts: ^6.2.1

  # Icons pack
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
